name: Build Shirqat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create Project
        run: flutter create --org com.shirqat --project-name shirqat_guide myapp

      - name: Write pubspec
        run: echo "" | base64 -d > myapp/pubspec.yaml

      - name: Write main.dart
        run: echo "" | base64 -d > myapp/lib/main.dart

      - name: Build APK
        run: |
          cd myapp
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shirqat-apk
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
