// ── Splash ────────────────────────────────────────────────────
class Splash extends StatefulWidget{
  const Splash({super.key});
  @override State<Splash> createState()=>_SplashSt();
}
class _SplashSt extends State<Splash> with SingleTickerProviderStateMixin{
  late AnimationController _c;
  late Animation<double> _s,_f;
  @override void initState(){super.initState();
    _c=AnimationController(vsync:this,duration:const Duration(milliseconds:800));
    _s=Tween<double>(begin:.5,end:1).animate(CurvedAnimation(parent:_c,curve:Curves.elasticOut));
    _f=Tween<double>(begin:0,end:1).animate(CurvedAnimation(parent:_c,curve:Curves.easeIn));
    _c.forward();
    Future.delayed(const Duration(seconds:2),(){if(mounted)Navigator.pushReplacement(context,
      PageRouteBuilder(pageBuilder:(_,__,___)=>const Home(),
        transitionsBuilder:(_,a,__,c)=>FadeTransition(opacity:a,child:c),
        transitionDuration:const Duration(milliseconds:400)));});}
  @override void dispose(){_c.dispose();super.dispose();}
  @override Widget build(BuildContext ctx)=>Scaffold(
    body:Container(
      decoration:const BoxDecoration(gradient:LinearGradient(colors:[kPrimary,kDark],begin:Alignment.topRight,end:Alignment.bottomLeft)),
      child:Center(child:FadeTransition(opacity:_f,child:ScaleTransition(scale:_s,
        child:Column(mainAxisSize:MainAxisSize.min,children:[
          Container(width:100,height:100,decoration:BoxDecoration(color:Colors.white,
            borderRadius:BorderRadius.circular(28),
            boxShadow:[BoxShadow(color:Colors.black26,blurRadius:20,offset:const Offset(0,8))]),
            child:const Center(child:Text('📍',style:TextStyle(fontSize:52)))),
          const SizedBox(height:24),
          const Text('دليل الشرقاط',style:TextStyle(color:Colors.white,fontSize:32,fontWeight:FontWeight.w900)),
          const SizedBox(height:8),
          const Text('كل ما تحتاجه في مدينتك',style:TextStyle(color:Colors.white70,fontSize:15))]))))));
}

