      - name: Build APK
        run: |
          cd myapp
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: دليل-الشرقاط-APK
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
