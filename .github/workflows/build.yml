// ── Prayer Widget ─────────────────────────────────────────────
class PrayerWidget extends StatefulWidget{
  const PrayerWidget({super.key});
  @override State<PrayerWidget> createState()=>_PWSt();
}
class _PWSt extends State<PrayerWidget>{
  Map<String,String>? _p;Map<String,dynamic>? _w;bool _l=true;
  @override void initState(){super.initState();_load();}
  Future<void> _load()async{
    final r=await Future.wait([Api.prayer(),Api.weather()]);
    if(mounted)setState((){_p=r[0]as Map<String,String>?;_w=r[1]as Map<String,dynamic>?;_l=false;});}
  String _fmt(String t){if(t.isEmpty)return'';final p=t.split(':');final h=int.tryParse(p[0])??0;
    final m=p.length>1?p[1]:'00';return'${h%12==0?12:h%12}:$m ${h>=12?"م":"ص"}';}
  int _next(){if(_p==null)return 0;
    final ks=['Fajr','Dhuhr','Asr','Maghrib','Isha'];
    final now=DateTime.now();final cur=now.hour*60+now.minute;
    for(int i=0;i<ks.length;i++){final sp=(_p![ks[i]]??'0:0').split(':');
      final h=int.tryParse(sp[0])??0;final m=sp.length>1?(int.tryParse(sp[1])??0):0;
      if(h*60+m>cur)return i;}return 0;}
  @override Widget build(BuildContext ctx){
    if(_l)return Container(height:150,decoration:BoxDecoration(
      gradient:const LinearGradient(colors:[kPrimary,kDark],begin:Alignment.topRight,end:Alignment.bottomLeft),
      borderRadius:BorderRadius.circular(22)),
      child:const Center(child:CircularProgressIndicator(color:Colors.white)));
    final prayers=[
      {'k':'Fajr','n':'الفجر','e':'🌅'},{'k':'Dhuhr','n':'الظهر','e':'☀️'},
      {'k':'Asr','n':'العصر','e':'🌤️'},{'k':'Maghrib','n':'المغرب','e':'🌇'},
      {'k':'Isha','n':'العشاء','e':'🌙'}];
    final ni=_next();
    return Container(decoration:BoxDecoration(
      gradient:const LinearGradient(colors:[kPrimary,kDark],begin:Alignment.topRight,end:Alignment.bottomLeft),
      borderRadius:BorderRadius.circular(22),
      boxShadow:[BoxShadow(color:kPrimary.withOpacity(.3),blurRadius:16,offset:const Offset(0,6))]),
      padding:const EdgeInsets.all(16),
      child:Column(children:[
        Row(mainAxisAlignment:MainAxisAlignment.spaceBetween,children:[
          Row(children:[
            Container(padding:const EdgeInsets.all(7),decoration:BoxDecoration(color:Colors.white24,borderRadius:BorderRadius.circular(10)),
              child:const Icon(Icons.access_time,color:Colors.white,size:17)),
            const SizedBox(width:10),
            const Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
              Text('مواقيت الصلاة',style:TextStyle(color:Colors.white,fontWeight:FontWeight.w800,fontSize:13)),
              Text('الشرقاط، صلاح الدين',style:TextStyle(color:Colors.white70,fontSize:10))])]),
          if(_w!=null)Container(padding:const EdgeInsets.symmetric(horizontal:10,vertical:6),
            decoration:BoxDecoration(color:Colors.white24,borderRadius:BorderRadius.circular(10)),
            child:Row(children:[
              Text(Api.wEmoji((_w!['code']as num).toInt()),style:const TextStyle(fontSize:15)),
              const SizedBox(width:5),
              Text('${(_w!['temp']as double).round()}°',style:const TextStyle(color:Colors.white,fontWeight:FontWeight.w800,fontSize:14))]))]),
        const SizedBox(height:14),
        if(_p!=null)Row(children:List.generate(5,(i){
          final p=prayers[i];final isN=i==ni;
          return Expanded(child:AnimatedContainer(duration:const Duration(milliseconds:300),
            margin:const EdgeInsets.symmetric(horizontal:2),padding:const EdgeInsets.symmetric(vertical:7),
            decoration:BoxDecoration(color:isN?Colors.white:Colors.white24,borderRadius:BorderRadius.circular(12),
              border:Border.all(color:isN?Colors.white:Colors.white24)),
            child:Column(children:[
              Text(p['e']!,style:const TextStyle(fontSize:15)),const SizedBox(height:3),
              Text(p['n']!,style:TextStyle(color:isN?kPrimary:Colors.white,fontWeight:FontWeight.w800,fontSize:9)),
              const SizedBox(height:1),
              Text(_fmt(_p![p['k']]??''),style:TextStyle(color:isN?kDark:Colors.white,fontWeight:FontWeight.w700,fontSize:8),textAlign:TextAlign.center)])));
        }))else const Text('تعذر تحميل المواقيت',style:TextStyle(color:Colors.white70))]));
  }
}

// ── Item Card ─────────────────────────────────────────────────
class IC extends StatelessWidget{
  final String title,sub,loc,img;final bool ver;final VoidCallback onTap;
  const IC({super.key,required this.title,required this.sub,required this.loc,required this.img,required this.onTap,this.ver=false});
  @override Widget build(BuildContext ctx)=>GestureDetector(onTap:onTap,
    child:Container(margin:const EdgeInsets.only(bottom:10),padding:const EdgeInsets.all(12),
      decoration:BoxDecoration(color:kCard,borderRadius:BorderRadius.circular(18),
        border:Border.all(color:ver?kPrimary.withOpacity(.3):kBorder),
        boxShadow:[BoxShadow(color:Colors.black.withOpacity(.04),blurRadius:8,offset:const Offset(0,2))]),
      child:Row(children:[
        ClipRRect(borderRadius:BorderRadius.circular(12),
          child:CachedNetworkImage(imageUrl:img,width:66,height:66,fit:BoxFit.cover,
            placeholder:(_,__)=>Container(width:66,height:66,color:const Color(0xFFF1F5F9),child:const Icon(Icons.image,color:Color(0xFFCBD5E1))),
            errorWidget:(_,__,___)=>Container(width:66,height:66,color:const Color(0xFFF1F5F9),child:const Icon(Icons.store,color:Color(0xFFCBD5E1))))),
        const SizedBox(width:12),
        Expanded(child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
          Row(children:[Expanded(child:Text(title,style:const TextStyle(fontWeight:FontWeight.w800,fontSize:13),maxLines:1,overflow:TextOverflow.ellipsis)),
            if(ver)const Icon(Icons.verified,color:kPrimary,size:15)]),
          const SizedBox(height:3),
          Text(sub,style:const TextStyle(color:kPrimary,fontWeight:FontWeight.w600,fontSize:11)),
          const SizedBox(height:3),
          Row(children:[const Icon(Icons.location_on_outlined,size:11,color:kSub),const SizedBox(width:2),
            Expanded(child:Text(loc,style:const TextStyle(color:kSub,fontSize:10),maxLines:1,overflow:TextOverflow.ellipsis))])])),
        const Icon(Icons.chevron_left,color:Color(0xFFCBD5E1))])));
}

Widget sf(String h,ValueChanged<String> f)=>Container(
  decoration:BoxDecoration(color:kCard,borderRadius:BorderRadius.circular(14),border:Border.all(color:kBorder)),
  child:TextField(onChanged:f,textAlign:TextAlign.right,
    decoration:InputDecoration(hintText:h,hintStyle:const TextStyle(color:kSub,fontSize:13),
      prefixIcon:const Icon(Icons.search,color:kSub),border:InputBorder.none,
      contentPadding:const EdgeInsets.symmetric(vertical:13))));

Widget dr(IconData icon,String lbl,String val,{bool ph=false})=>
  Container(margin:const EdgeInsets.only(bottom:10),padding:const EdgeInsets.all(13),
    decoration:BoxDecoration(color:const Color(0xFFF8FAFC),borderRadius:BorderRadius.circular(13)),
    child:Row(children:[Icon(icon,color:kPrimary,size:19),const SizedBox(width:11),
      Expanded(child:Column(crossAxisAlignment:CrossAxisAlignment.start,children:[
        Text(lbl,style:const TextStyle(color:kSub,fontSize:10)),const SizedBox(height:2),
        Text(val,style:const TextStyle(fontWeight:FontWeight.w700,fontSize:13))])),
      if(ph)GestureDetector(onTap:()=>launchUrl(Uri.parse('tel:$val')),
        child:Container(padding:const EdgeInsets.symmetric(horizontal:13,vertical:8),
          decoration:BoxDecoration(color:kPrimary,borderRadius:BorderRadius.circular(10)),
          child:const Row(children:[Icon(Icons.phone,color:Colors.white,size:14),SizedBox(width:4),
            Text('اتصال',style:TextStyle(color:Colors.white,fontWeight:FontWeight.w700,fontSize:12))])))]));

// ── Shops Screen ──────────────────────────────────────────────
class ShopsScreen extends StatefulWidget{const ShopsScreen({super.key});@override State<ShopsScreen> createState()=>_SS();}
class _SS extends State<ShopsScreen>{
  late List<Shop> _shops;String _q='',_cat='all';
  final _cats=[['all','الكل','🏪'],['food','غذائية','🥑'],['clothes','ملابس','👕'],['electronics','كهربائيات','💡'],['pharma','صيدليات','💊']];
  @override void initState(){super.initState();_shops=S.shops();}
  List<Shop> get _f=>_shops.where((s){final mc=_cat=='all'||s.category==_cat;final mq=_q.isEmpty||s.title.contains(_q)||s.shopName.contains(_q);return mc&&mq;}).toList()..sort((a,b)=>(b.isVerified?1:0)-(a.isVerified?1:0));
  @override Widget build(BuildContext ctx)=>Scaffold(backgroundColor:kBg,
    appBar:AppBar(title:const Text('دليل الشرقاط'),leading:IconButton(icon:const Icon(Icons.arrow_forward_ios),onPressed:()=>Navigator.pop(ctx))),
    body:Column(children:[
      Container(color:kCard,padding:const EdgeInsets.fromLTRB(16,10,16,0),child:Column(children:[
        sf('ابحث عن محل أو عرض...',(v)=>setState(()=>_q=v)),const SizedBox(height:10),
        SizedBox(height:38,child:ListView(scrollDirection:Axis.horizontal,reverse:true,
          children:_cats.map((c){final a=_cat==c[0];return GestureDetector(onTap:()=>setState(()=>_cat=c[0]),
            child:AnimatedContainer(duration:const Duration(milliseconds:200),
              margin:const EdgeInsets.only(right:7),padding:const EdgeInsets.symmetric(horizontal:13,vertical:7),
              decoration:BoxDecoration(color:a?kPrimary:kBg,borderRadius:BorderRadius.circular(18),border:Border.all(color:a?kPrimary:kBorder)),
              child:Row(children:[Text(c[2],style:const TextStyle(fontSize:13)),const SizedBox(width:4),
                Text(c[1],style:TextStyle(color:a?Colors.white:kSub,fontWeight:FontWeight.w700,fontSize:11))])));}).toList())),
        const SizedBox(height:8)])),
      Expanded(child:_f.isEmpty?const Center(child:Text('لا توجد نتائج',style:TextStyle(color:kSub))):
        ListView.builder(padding:const EdgeInsets.all(16),itemCount:_f.length,
          itemBuilder:(_,i){final s=_f[i];return IC(title:s.title,sub:s.shopName,loc:s.location,
            img:s.imageUrl??'https://picsum.photos/seed/shop/300/200',ver:s.isVerified,
            onTap:()=>Nav.to(ctx,ShopDetail(shop:s)));}))]));
}

