// ── Storage ───────────────────────────────────────────────────
class S {
  static SharedPreferences? _p;
  static Future<void> init() async{_p=await SharedPreferences.getInstance();}
  static List<Shop> shops()=>_get('shops',defaultShops,Shop.fromJson);
  static List<Doctor> doctors()=>_get('doctors',defaultDoctors,Doctor.fromJson);
  static List<Taxi> taxis()=>_get('taxis',defaultTaxis,Taxi.fromJson);
  static Map<String,dynamic>? prayer(){final r=_p?.getString('prayer');return r==null?null:jsonDecode(r);}
  static Future<void> savePrayer(Map<String,dynamic> d)async=>_p?.setString('prayer',jsonEncode(d));
  static Map<String,dynamic>? weather(){final r=_p?.getString('weather');return r==null?null:jsonDecode(r);}
  static Future<void> saveWeather(Map<String,dynamic> d)async=>_p?.setString('weather',jsonEncode(d));
  static List<T> _get<T>(String k,List<T> fb,T Function(Map<String,dynamic>)f){
    try{final r=_p?.getString('s_$k');if(r==null)return fb;
      return(jsonDecode(r)as List).map((e)=>f(e)).toList();}catch(_){return fb;}}
}

// ── API ───────────────────────────────────────────────────────
class Api {
  static Future<Map<String,String>?> prayer()async{
    final c=S.prayer();
    if(c!=null){final d=DateTime.parse(c['date']);final n=DateTime.now();
      if(d.year==n.year&&d.month==n.month&&d.day==n.day)return Map<String,String>.from(c['timings']);}
    try{final r=await http.get(Uri.parse(
      'https://api.aladhan.com/v1/timingsByCity?city=Ash%20Sharqat&country=Iraq&method=3'))
      .timeout(const Duration(seconds:8));
      if(r.statusCode==200){final t=jsonDecode(r.body)['data']['timings']as Map<String,dynamic>;
        final cl=t.map((k,v)=>MapEntry(k,(v as String).split(' ').first));
        await S.savePrayer({'timings':cl,'date':DateTime.now().toIso8601String()});
        return Map<String,String>.from(cl);}}catch(_){}
    return c!=null?Map<String,String>.from(c['timings']):null;}

  static Future<Map<String,dynamic>?> weather()async{
    final c=S.weather();
    if(c!=null&&DateTime.now().difference(DateTime.fromMillisecondsSinceEpoch(c['at'])).inHours<3)return c;
    try{final r=await http.get(Uri.parse(
      'https://api.open-meteo.com/v1/forecast?latitude=35.5033&longitude=43.2433&current=temperature_2m,weather_code'))
      .timeout(const Duration(seconds:6));
      if(r.statusCode==200){final d=jsonDecode(r.body)['current'];
        final res={'temp':d['temperature_2m'].toDouble(),'code':d['weather_code'],'at':DateTime.now().millisecondsSinceEpoch};
        await S.saveWeather(res);return res;}}catch(_){}
    return c;}

  static String wEmoji(int c){
    if(c<=1)return'☀️';if(c<=3)return'⛅';if(c==45)return'🌫️';
    if(c<=67)return'🌧️';if(c<=77)return'❄️';if(c>=95)return'⛈️';return'🌤️';}
}

