name: Build Shirqat APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Create Flutter Project
        run: |
          flutter create --org com.shirqat --project-name shirqat_guide myapp
          cd myapp
          
          # تحديث pubspec.yaml
          cat > pubspec.yaml << 'EOF'
name: shirqat_guide
description: دليل الشرقاط
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  http: ^1.2.0
  url_launcher: ^6.2.4
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
flutter:
  uses-material-design: true
EOF

      - name: Write App Code
        run: |
          cat > myapp/lib/main.dart << 'DARTEOF'
