                  if(taxi.phone2!=null) detailRow(Icons.phone,'رقم بديل',taxi.phone2!,phone:true)]))])));
          }
          MAINDART

      - name: كتابة AndroidManifest.xml
        run: |
          mkdir -p shirqat/android/app/src/main
          cat > shirqat/android/app/src/main/AndroidManifest.xml << 'XML'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.CALL_PHONE"/>
              <application android:label="دليل الشرقاط" android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher" android:usesCleartextTraffic="true">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:launchMode="singleTop" android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
                      <intent-filter><action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2"/>
              </application>
          </manifest>
          XML

      - name: إنشاء Flutter project والبناء
        run: |
          flutter create --org com.shirqat --project-name shirqat_guide shirqat_build
          cp shirqat/pubspec.yaml shirqat_build/pubspec.yaml
          cp shirqat/lib/main.dart shirqat_build/lib/main.dart
          cp shirqat/android/app/src/main/AndroidManifest.xml shirqat_build/android/app/src/main/AndroidManifest.xml
          cd shirqat_build
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: رفع APK
        uses: actions/upload-artifact@v4
        with:
          name: دليل-الشرقاط-APK
          path: shirqat_build/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: رسالة النجاح
        run: echo "✅ تم بناء APK بنجاح! اذهب إلى Actions واضغط على دليل-الشرقاط-APK لتحميله"

